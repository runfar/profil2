name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub Secret 사용 예시:
      # 1) 저장소 Settings > Secrets and variables > Actions 에서
      #    이름이 DEMO_SECRET 인 시크릿을 하나 만들어 보세요 (동작 원리 확인용이니 민감하지 않은 값이면 됩니다).
      # 2) secrets.DEMO_SECRET 으로 참조하면 값이 워크플로우 로그에는 자동으로 "***" 로 마스킹되어 찍히고,
      # 3) sed 로 src/app/app.html 의 플레이스홀더(__DEMO_SECRET__)를 실제 값으로 치환한 뒤 빌드하면
      #    배포된 페이지에서 최종 결과를 눈으로 확인할 수 있습니다.
      #    (데모용 sed 치환이라 값에 '/' 같은 문자가 있으면 깨질 수 있으니, 테스트 값은 영숫자로 간단하게 넣어보세요.)
      - name: GitHub Secret 동작 확인 (예시)
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
          if [ -n "$DEMO_SECRET" ]; then
            echo "DEMO_SECRET 길이: ${#DEMO_SECRET}자"
            echo "DEMO_SECRET 값(자동 마스킹됨): $DEMO_SECRET"
            sed -i "s/__DEMO_SECRET__/$DEMO_SECRET/" src/app/app.html
          else
            echo "DEMO_SECRET 시크릿이 설정되어 있지 않습니다."
            echo "Settings > Secrets and variables > Actions 에서 추가해 보세요."
            sed -i "s/__DEMO_SECRET__/(설정되지 않음)/" src/app/app.html
          fi

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # GitHub Pages 프로젝트 페이지는 https://<user>.github.io/<repo>/ 처럼
      # 하위 경로에서 서빙되는데, Angular 빌드 기본값은 <base href="/"> 라서
      # 그대로 두면 JS/CSS 를 도메인 루트에서 찾다가 404가 납니다.
      # configure-pages 가 알려주는 실제 base path(예: /profil2/)를 --base-href 로 넘겨줍니다.
      - name: Build
        run: npx ng build --configuration production --base-href "${{ steps.pages.outputs.base_path }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/profil2/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
